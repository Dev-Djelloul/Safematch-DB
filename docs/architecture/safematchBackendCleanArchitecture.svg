<!-- REQUEST FLOW -->
<rect x="30" y="806" width="800" height="272" rx="10" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5"/>
<rect x="30" y="806" width="800" height="34" rx="10" fill="#e2e8f0"/>
<rect x="30" y="828" width="800" height="12" fill="#e2e8f0"/>
<text x="430" y="828" text-anchor="middle" font-size="12" font-weight="800" fill="#1e293b" letter-spacing="0.5">REQUEST FLOW — createMatch() example</text>
<line x1="46" y1="840" x2="814" y2="840" stroke="#cbd5e1" stroke-width="1"/>

<!-- steps -->
<rect x="50" y="850" width="22" height="22" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
<text x="61" y="866" text-anchor="middle" font-size="9.5" font-weight="800" fill="#1d4ed8">1</text>
<text x="82" y="866" font-size="9.5" fill="#1e293b" font-weight="700">API</text>
<text x="118" y="866" font-size="9" fill="#475569">Controller receives HTTP &#x2192; validates DTO &#x2192; maps to domain model &#x2192; calls MatchService</text>

<rect x="50" y="880" width="22" height="22" rx="4" fill="#dcfce7" stroke="#059669" stroke-width="1.2"/>
<text x="61" y="896" text-anchor="middle" font-size="9.5" font-weight="800" fill="#065f46">2</text>
<text x="82" y="896" font-size="9.5" fill="#1e293b" font-weight="700">Domain</text>
<text x="134" y="896" font-size="9" fill="#475569">MatchService applies business rules &#x2192; calls MatchRepositoryPort.save()</text>

<rect x="50" y="910" width="22" height="22" rx="4" fill="#dcfce7" stroke="#059669" stroke-width="1.2"/>
<text x="61" y="926" text-anchor="middle" font-size="9.5" font-weight="800" fill="#065f46">3</text>
<text x="82" y="926" font-size="9.5" fill="#1e293b" font-weight="700">Domain</text>
<text x="134" y="926" font-size="9" fill="#475569">Calls AiScoringPort.score() &#x2192; emits MatchCreatedEvent</text>

<rect x="50" y="940" width="22" height="22" rx="4" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.2"/>
<text x="61" y="956" text-anchor="middle" font-size="9.5" font-weight="800" fill="#6d28d9">4</text>
<text x="82" y="956" font-size="9.5" fill="#1e293b" font-weight="700">Infra</text>
<text x="118" y="956" font-size="9" fill="#475569">MatchRepositoryAdapter writes to PostgreSQL (Cloud SQL)</text>

<rect x="50" y="970" width="22" height="22" rx="4" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.2"/>
<text x="61" y="986" text-anchor="middle" font-size="9.5" font-weight="800" fill="#6d28d9">5</text>
<text x="82" y="986" font-size="9.5" fill="#1e293b" font-weight="700">Infra</text>
<text x="118" y="986" font-size="9" fill="#475569">AiScoringAdapter calls AI provider &#x2192; FirestoreAdapter syncs metadata</text>

<rect x="50" y="1000" width="22" height="22" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="1.2"/>
<text x="61" y="1016" text-anchor="middle" font-size="9.5" font-weight="800" fill="#1d4ed8">6</text>
<text x="82" y="1016" font-size="9.5" fill="#1e293b" font-weight="700">API</text>
<text x="118" y="1016" font-size="9" fill="#475569">Maps domain result &#x2192; response DTO &#x2192; returns HTTP 201</text>

<line x1="46" y1="1032" x2="814" y2="1032" stroke="#e2e8f0" stroke-width="1"/>
<text x="50" y="1047" font-size="8.5" fill="#94a3b8" font-style="italic">Key principle: API never touches Infrastructure directly. All cross-layer calls flow through domain ports.</text>
<text x="50" y="1062" font-size="8.5" fill="#94a3b8" font-style="italic">Domain knows nothing about Spring, JPA, Firestore, or any framework. It only knows interfaces (ports).</text>

